name: Notify marketplace

on:
  push:
    branches: [main]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch to marketplace
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: token ${{ secrets.MARKETPLACE_PAT }}" \
            https://api.github.com/repos/BrightWayAI/claude-plugins/dispatches \
            -d '{"event_type":"plugin-updated","client_payload":{"submodule":"session-memory"}}'
