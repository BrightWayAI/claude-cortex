name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate plugin.json
        run: python3 -c "import json; json.load(open('.claude-plugin/plugin.json'))"

      - name: Check commands, skills, optional .claude/commands
        run: python3 scripts/check_repo.py
